#cloud-config
# Rundeck EC2 instance provisioning
# Template vars rendered by Terraform templatefile()

package_update: true
package_upgrade: true

write_files:
  - path: /etc/nginx/nginx.conf
    permissions: '0644'
    content: |
      user nginx;
      worker_processes auto;
      error_log /var/log/nginx/error.log;
      pid /run/nginx.pid;
      include /usr/share/nginx/modules/*.conf;
      events {
          worker_connections 1024;
      }
      http {
          log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';
          access_log  /var/log/nginx/access.log  main;
          sendfile            on;
          tcp_nopush          on;
          tcp_nodelay         on;
          keepalive_timeout   65;
          types_hash_max_size 4096;
          include             /etc/nginx/mime.types;
          default_type        application/octet-stream;
          include /etc/nginx/conf.d/*.conf;
      }
%{ if enable_cloudwatch_logs ~}
  - path: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    permissions: '0644'
    content: |
      {
        "agent": {
          "run_as_user": "cwagent",
          "metrics_collection_interval": 60
        },
        "metrics": {
          "namespace": "CWAgent",
          "metrics_collected": {
            "mem": {
              "measurement": ["mem_used_percent"]
            },
            "disk": {
              "measurement": ["disk_used_percent"],
              "resources": ["/"],
              "ignore_file_system_types": ["tmpfs", "devtmpfs"],
              "drop_device": true
            },
            "procstat": [
              {
                "pattern": "Drundeck.jaaslogin",
                "measurement": ["pid_count"]
              },
              {
                "pattern": "nginx: master",
                "measurement": ["pid_count"]
              },
              {
                "pattern": "postgres",
                "measurement": ["pid_count"]
              }
            ]
          },
          "append_dimensions": {
            "InstanceId": "$${aws:InstanceId}"
          }
        },
        "logs": {
          "logs_collected": {
            "files": {
              "collect_list": [
                {
                  "file_path": "/var/log/cloud-init-output.log",
                  "log_group_name": "${log_group_name}",
                  "log_stream_name": "{instance_id}/setup"
                },
                {
                  "file_path": "/var/log/rundeck/service.log",
                  "log_group_name": "${log_group_name}",
                  "log_stream_name": "{instance_id}/rundeck"
                },
                {
                  "file_path": "/var/log/nginx/error.log",
                  "log_group_name": "${log_group_name}",
                  "log_stream_name": "{instance_id}/nginx-error"
                },
                {
                  "file_path": "/var/log/nginx/access.log",
                  "log_group_name": "${log_group_name}",
                  "log_stream_name": "{instance_id}/nginx-access"
                },
                {
                  "file_path": "/var/log/secure",
                  "log_group_name": "${log_group_name}",
                  "log_stream_name": "{instance_id}/secure"
                }
              ]
            }
          },
          "log_stream_name": "{instance_id}/default",
          "force_flush_interval": 15
        }
      }
%{ endif ~}

runcmd:
  # Install EPEL and base packages
  - dnf install -y epel-release
  - dnf install -y java-17-openjdk-headless htop nginx unzip
  - |
    export HOME=/root
    curl -fsSL https://get.acme.sh | sh || true

  # Install and configure PostgreSQL 16
  - dnf install -y https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm
  - dnf -qy module disable postgresql
  - dnf install -y postgresql16-server postgresql16
  - /usr/pgsql-16/bin/postgresql-16-setup initdb
  - |
    sed -i "s/#password_encryption = scram-sha-256/password_encryption = scram-sha-256/" /var/lib/pgsql/16/data/postgresql.conf
    cat > /var/lib/pgsql/16/data/pg_hba.conf << 'PGHBA'
    # TYPE  DATABASE  USER      ADDRESS     METHOD
    local   all       postgres              peer
    local   rundeck   rundeck               scram-sha-256
    host    rundeck   rundeck   127.0.0.1/32 scram-sha-256
    PGHBA
  - systemctl enable --now postgresql-16
  - |
    PG_PASSWORD=$(openssl rand -base64 32 | tr -dc 'a-zA-Z0-9' | head -c 24)
    echo "$PG_PASSWORD" > /tmp/.rundeck_pg_password
    chmod 600 /tmp/.rundeck_pg_password
    sudo -u postgres psql -c "CREATE USER rundeck WITH PASSWORD '$PG_PASSWORD';"
    sudo -u postgres psql -c "CREATE DATABASE rundeck OWNER rundeck;"

  # Install Rundeck from official repository
  - |
    cat > /etc/yum.repos.d/rundeck.repo << 'REPO'
    [rundeck]
    name=Rundeck - Release
    baseurl=https://packages.rundeck.com/pagerduty/rundeck/rpm_any/rpm_any/$basearch
    gpgcheck=0
    enabled=1
    REPO
    dnf install -y rundeck

  # Main setup: TLS, nginx, Rundeck config (single IMDS fetch)
  - |
    export HOME=/root
    TOKEN=$(curl -sX PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60")
    PUBLIC_IP=$(curl -sH "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
    AWS_REGION=$(curl -sH "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
    echo "Public IP: $PUBLIC_IP, Region: $AWS_REGION"

    # TLS certificate (Let's Encrypt shortlived profile, self-signed fallback)
    mkdir -p /etc/nginx/ssl
    /root/.acme.sh/acme.sh --issue --standalone \
      -d "$PUBLIC_IP" \
      --server letsencrypt \
      --keylength 2048 \
      --cert-profile shortlived \
      --httpport 80 || true
    /root/.acme.sh/acme.sh --install-cert -d "$PUBLIC_IP" \
      --key-file /etc/nginx/ssl/key.pem \
      --fullchain-file /etc/nginx/ssl/cert.pem \
      --reloadcmd "systemctl reload nginx" || true
    if [ ! -f /etc/nginx/ssl/cert.pem ]; then
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        -keyout /etc/nginx/ssl/key.pem \
        -out /etc/nginx/ssl/cert.pem \
        -subj "/CN=$PUBLIC_IP"
    fi

    # nginx reverse proxy
    cat > /etc/nginx/conf.d/rundeck.conf << NGINXCONF
    server {
        listen 80;
        server_name $PUBLIC_IP;
        return 301 https://\$host\$request_uri;
    }
    server {
        listen 443 ssl;
        server_name $PUBLIC_IP;
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        location / {
            proxy_pass http://localhost:4440;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
        location /health {
            proxy_pass http://localhost:4440/health;
            access_log off;
        }
    }
    NGINXCONF
    rm -f /etc/nginx/conf.d/default.conf

%{ if rundeck_admin_password_ssm_path != null ~}
    # Install AWS CLI v2 (for SSM Parameter Store)
    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
    unzip -qo /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
    rm -rf /tmp/aws /tmp/awscliv2.zip

    # Retrieve admin password from SSM Parameter Store
    ADMIN_PASSWORD=$(/usr/local/bin/aws ssm get-parameter \
      --name "${rundeck_admin_password_ssm_path}" \
      --with-decryption \
      --region "$AWS_REGION" \
      --query 'Parameter.Value' \
      --output text)
    if [ -n "$ADMIN_PASSWORD" ]; then
      sed -i "s/^admin:admin,/admin:$ADMIN_PASSWORD,/" /etc/rundeck/realm.properties
    fi
%{ endif ~}

    # Configure Rundeck with PostgreSQL backend
    PG_PASSWORD=$(cat /tmp/.rundeck_pg_password)
    cat > /etc/rundeck/rundeck-config.properties << RDCONF
    loglevel.default=INFO
    rdeck.base=/var/lib/rundeck
    rss.enabled=false
    grails.serverURL=https://$PUBLIC_IP
    dataSource.dbCreate=update
    dataSource.url=jdbc:postgresql://localhost:5432/rundeck
    dataSource.driverClassName=org.postgresql.Driver
    dataSource.username=rundeck
    dataSource.password=$PG_PASSWORD
    rundeck.projectsStorageType=db
    rundeck.log4j.config.file=/etc/rundeck/log4j2.properties
    server.session.timeout=${rundeck_session_timeout}m
    server.useForwardHeaders=true
    RDCONF

%{ if !enable_plugin_repository ~}
    # Disable plugin repository
    cat > /etc/rundeck/artifact-repositories.yaml << 'PLUGINCONF'
    repositories: []
    PLUGINCONF
%{ endif ~}

    # Configure JVM settings
    sed -i 's|^RDECK_JVM_SETTINGS=.*|RDECK_JVM_SETTINGS="${rundeck_jvm_settings}"|' /etc/rundeck/profile

    # Cleanup
    rm -f /tmp/.rundeck_pg_password

  # SELinux: allow nginx to proxy to Rundeck
  - setsebool -P httpd_can_network_connect 1

  # Enable and start services
  - systemctl enable --now nginx
  - systemctl enable rundeckd
  - systemctl start rundeckd

%{ if enable_cloudwatch_logs || enable_ssm ~}
  # Install agents (single IMDS fetch for both)
  - |
    TOKEN=$(curl -sX PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60")
    AWS_REGION=$(curl -sH "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
%{ if enable_cloudwatch_logs ~}
    dnf install -y --nogpgcheck "https://s3.$AWS_REGION.amazonaws.com/amazoncloudwatch-agent-$AWS_REGION/redhat/amd64/latest/amazon-cloudwatch-agent.rpm"
%{ endif ~}
%{ if enable_ssm ~}
    dnf install -y "https://s3.$AWS_REGION.amazonaws.com/amazon-ssm-$AWS_REGION/latest/linux_amd64/amazon-ssm-agent.rpm"
%{ endif ~}
%{ endif ~}
%{ if enable_cloudwatch_logs ~}
  # Grant cwagent read access to log files and start agent
  - setfacl -m u:cwagent:rx /var/log/rundeck 2>/dev/null || true
  - setfacl -m u:cwagent:r /var/log/rundeck/service.log 2>/dev/null || true
  - setfacl -m u:cwagent:rx /var/log/nginx 2>/dev/null || true
  - setfacl -m u:cwagent:r /var/log/nginx/error.log 2>/dev/null || true
  - setfacl -m u:cwagent:r /var/log/nginx/access.log 2>/dev/null || true
  - setfacl -m u:cwagent:r /var/log/secure 2>/dev/null || true
  - /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
  - systemctl enable amazon-cloudwatch-agent
%{ endif ~}
%{ if enable_ssm ~}
  - systemctl enable --now amazon-ssm-agent
%{ endif ~}
%{ if !enable_ssh ~}
  # Disable SSH (SSM-only access)
  - systemctl disable --now sshd
%{ endif ~}
  - echo "Rundeck setup complete"
%{ if user_data_extra != "" ~}
  # User-provided extra commands
  - |
    ${indent(4, user_data_extra)}
%{ endif ~}
